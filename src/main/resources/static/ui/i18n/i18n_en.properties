#
# Locale-specific stub: SAPUI5 always probes i18n_<locale>.properties first
# (e.g. i18n_en.properties, i18n_de.properties) and falls back to the base
# i18n.properties when those 404. The fallback works, but logged 404s
# clutter the browser console. This empty stub keeps everything in the
# base file (no per-locale strings yet) and silences the 404 spam.
