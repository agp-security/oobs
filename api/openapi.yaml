        '403': { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------- CIS
  /api/v1/cis/discover:
    post:
      tags: [CIS]
      summary: Ad-hoc CIS subaccount discovery
      description: |
        Required scope: `btpc.admin`. Classifies the supplied service key and
        requires it to be a CIS central-viewer key, then lists subaccounts.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CisDiscoverRequest' }
      responses:
        '200':
          description: Discovered subaccounts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CisDiscoverResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '502': { $ref: '#/components/responses/BadGateway' }

  # --------------------------------------------------------------- Containment
  /api/v1/containment:
    post:
      tags: [Containment]
      summary: Contain (lock) a user
      description: |
        Required scope: `btpc.responder`. Locks a user across the selected
        subaccounts / IAS tenants per the action flags in the request.
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContainRequest' }
      responses:
        '200':
          description: Containment result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContainmentResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '502': { $ref: '#/components/responses/BadGateway' }
  /api/v1/containment/unlock-preview:
    get:
      tags: [Containment]
      summary: Preview what an unlock would restore
      description: 'Required scope: `btpc.viewer`.'
      parameters:
        - name: userEmail
          in: query
          required: true
          schema: { type: string }
        - name: subaccountIds
          in: query
          required: false
          schema:
            type: array
            items: { type: string, format: uuid }
          style: form
          explode: true
      responses:
        '200':
          description: Preview entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UnlockPreviewEntry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/containment/unlock:
    post:
      tags: [Containment]
      summary: Unlock a previously contained user
      description: 'Required scope: `btpc.responder`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UnlockRequest' }
      responses:
        '200':
          description: Unlock result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UnlockResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '502': { $ref: '#/components/responses/BadGateway' }

  # ----------------------------------------------------------- Protected users
  /api/v1/protected-users:
