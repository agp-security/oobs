        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/discovery/keys/{id}/sync:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Discovery]
      summary: Trigger a discovery sync for one key
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      responses:
        '200':
          description: Sync result
          content:
            application/json:
