openapi: 3.0.3

info:
  title: BTP User Containment API
  version: 0.1.0-SNAPSHOT
  description: |
    REST API for the OOBS: a central operator console
    that enrolls SAP BTP subaccounts / IAS tenants, discovers identity providers
    and SoD conflicts, and contains (locks) or unlocks compromised users across subaccounts,
    Cloud Foundry (XSUAA) and IAS in response to an incident.

    ## Authentication
    All `/api/v1/**` endpoints (except `/health` and `/whoami`) require a valid
    XSUAA-issued OAuth2 **bearer JWT**. Authorization is enforced per-operation
    via OAuth2 scopes; the required scope is noted in each operation description.

    ## CSRF
    Keep in mind that the SAP app router uses CSRF. 
    For that see: x-csrf-token docu on the sap help site 
    (it changes all x days so you need to search it)

    ## Scope model
    Four scopes exist, in increasing privilege. The `@PreAuthorize` rules map to:
    - **`btpc.viewer`** - read-only. Satisfied by any of the four scopes.
    - **`btpc.sod_viewer`** - may run SoD scans (admin also allowed).
    - **`btpc.responder`** - may contain/unlock users (admin also allowed).
    - **`btpc.admin`** - full control: enrollment, credentials, config, deletes.

    "Required scope" below names the *minimum* intent; `btpc.admin` always
    satisfies it.

    ## Caller source
    Mutating endpoints accept an optional `X-Caller-Source` header used only for
    audit attribution (`soar` / `soar-api`, `system`, or default `UI`). It does
    not change behaviour or authorization.
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Jan-Luca Gruber
    url: https://agp-security.com

servers:
  - url: /
    description: Same-origin (served behind the approuter)

tags:
  - name: Platform
    description: Liveness and identity introspection
  - name: App config
    description: Global-account-wide configuration toggles
  - name: Subaccounts
    description: Enrolled subaccount lifecycle and credentials
  - name: Contacts
    description: Per-subaccount notification contacts
  - name: IAS tenants
    description: Enrolled IAS tenant lifecycle and credentials
  - name: Origin profiles
    description: Named groupings of XSUAA origin keys
  - name: Identity providers
    description: Live discovery of XSUAA identity providers
  - name: Discovery
    description: CIS central-viewer keys and discovered subaccount candidates
  - name: CIS
    description: Ad-hoc Cloud Management Service discovery
  - name: Containment
    description: Lock / unlock users across XSUAA + IAS
  - name: Protected users
    description: Break-glass allowlist that blocks containment
  - name: SoD
    description: Segregation-of-duties conflict sets and scans
  - name: User analysis
    description: Cross-system footprint of a single user
  - name: Audit logs
    description: Query and export the audit-event trail
  - name: Health check
    description: Credential health-probe matrix
  - name: Certificates
    description: Stored credential certificate inventory
  - name: Audit sinks
    description: Outbound audit forwarders (Splunk HEC, webhook, ...)

security:
  - xsuaa: []

paths:
  # ----------------------------------------------------------------- Platform
  /api/v1/health:
    get:
      tags: [Platform]
      summary: Liveness + DB connectivity probe
      description: |
        Public. Returns service status, version, active Spring profiles and
        whether the dev-auth shortcut is enabled. Also executes `SELECT 1`
        against Postgres; a DB failure surfaces as `500`.
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/whoami:
    get:
      tags: [Platform]
      summary: Current principal and granted scopes
      description: |
        Public/auth-aware. With no/invalid token returns
        `{ "authenticated": false }`; otherwise returns the user name and the
        granted scopes (with the `SCOPE_` prefix stripped).
      security: []
      responses:
        '200':
          description: Identity introspection
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WhoAmI' }

  # --------------------------------------------------------------- App config
  /api/v1/app-config:
    get:
      tags: [App config]
      summary: List global-account config values
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Map of config key to its current state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { $ref: '#/components/schemas/KeyState' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/app-config/{key}:
    put:
      tags: [App config]
      summary: Update a whitelisted config key
      description: |
        Required scope: `btpc.admin`. Only known keys are accepted
        (external-email internal domains, health auto-probe interval); an
        unknown key yields `400`.
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppConfigUpdate' }
      responses:
        '200':
          description: Updated key state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KeyState' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # -------------------------------------------------------------- Subaccounts
  /api/v1/subaccounts:
    get:
      tags: [Subaccounts]
      summary: List enrolled subaccounts
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Enrolled subaccounts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Subaccounts]
      summary: Enroll a subaccount from a service key
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnrollRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/v1/subaccounts/quick-add:
    post:
      tags: [Subaccounts]
      summary: Manually add a subaccount (no central-viewer required)
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuickAddRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/v1/subaccounts/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Subaccounts]
      summary: Get one subaccount
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Subaccounts]
      summary: Unenroll a subaccount
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      responses:
        '204': { description: Unenrolled }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/label:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Subaccounts]
      summary: Update the display label
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabelPatch' }
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/metadata:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Subaccounts]
      summary: Update subaccount metadata
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MetadataPatch' }
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/credentials:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subaccounts]
      summary: Attach a service key credential
      description: 'Required scope: `btpc.admin`. `serviceKey` is required.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttachCredential' }
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/cf-org-id:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Subaccounts]
      summary: Set the Cloud Foundry org id
      description: |
        Required scope: `btpc.admin`. Partial update of a single subaccount
        attribute (consistent with the `label` and `metadata` patches). Send
        `{ "cfOrgId": null }` to clear the pin.
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetCfOrgId' }
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/cf-technical-user:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subaccounts]
      summary: Attach a CF technical user
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CfTechnicalUserPayload' }
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/cf-technical-user/copy-from/{sourceId}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - name: sourceId
        in: path
        required: true
        description: Subaccount to copy the technical-user credential from
        schema: { type: string, format: uuid }
    post:
      tags: [Subaccounts]
      summary: Copy a CF technical user from another subaccount
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CopyCfTechUser' }
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/subaccounts/{id}/provision-xsuaa-apiaccess:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subaccounts]
      summary: Provision an XSUAA apiaccess plan instance
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      responses:
        '200':
          description: Updated subaccount
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------------------------------------------ Contacts
  /api/v1/subaccounts/{subaccountId}/contacts:
    parameters:
      - name: subaccountId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Contacts]
      summary: List contacts for a subaccount
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Contacts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubaccountContact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Contacts]
      summary: Add a contact
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactPayload' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountContact' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/subaccounts/{subaccountId}/contacts/{id}:
    parameters:
      - name: subaccountId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Contacts]
      summary: Update a contact
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactPayload' }
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubaccountContact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Contacts]
      summary: Delete a contact
      description: 'Required scope: `btpc.admin`.'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # --------------------------------------------------------------- IAS tenants
  /api/v1/ias-tenants:
    get:
      tags: [IAS tenants]
      summary: List enrolled IAS tenants
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: IAS tenants
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/IasTenantDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [IAS tenants]
      summary: Enroll an IAS tenant
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IasTenantCreatePayload' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IasTenantDto' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/v1/ias-tenants/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [IAS tenants]
      summary: Get one IAS tenant
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: IAS tenant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IasTenantDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [IAS tenants]
      summary: Delete an IAS tenant
      description: 'Required scope: `btpc.admin`.'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/ias-tenants/{id}/meta:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [IAS tenants]
      summary: Update IAS tenant display name
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IasTenantMeta' }
      responses:
        '200':
          description: Updated tenant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IasTenantDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/ias-tenants/{id}/credentials:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [IAS tenants]
      summary: Replace IAS tenant credentials
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IasTenantCreatePayload' }
      responses:
        '200':
          description: Updated tenant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IasTenantDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------------------------------------ Origin profiles
  /api/v1/origin-profiles:
    get:
      tags: [Origin profiles]
      summary: List origin profiles
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Origin profiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OriginProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Origin profiles]
      summary: Create an origin profile
      description: |
        Required scope: `btpc.admin`. `name` and a non-empty `originKeys`
        list are required; unknown origin keys are rejected unless discovery
        across the listed subaccounts was inconclusive.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OriginProfileBody' }
      responses:
        '200':
          description: Created profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OriginProfile' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/origin-profiles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Origin profiles]
      summary: Update an origin profile
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OriginProfileBody' }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OriginProfile' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Origin profiles]
      summary: Delete an origin profile
      description: 'Required scope: `btpc.admin`.'
      responses:
        '200': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ------------------------------------------------------- Identity providers
  /api/v1/xsuaa/identity-providers:
    get:
      tags: [Identity providers]
      summary: Discover XSUAA identity providers
      description: |
        Required scope: `btpc.viewer`. Live-queries enrolled subaccounts for
        their configured identity providers (used to build origin profiles).
      parameters:
        - name: subaccountIds
          in: query
          required: false
          description: Restrict discovery to these subaccount ids (repeatable)
          schema:
            type: array
            items: { type: string, format: uuid }
          style: form
          explode: true
      responses:
        '200':
          description: Discovery result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IdpDiscoverResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ----------------------------------------------------------------- Discovery
  /api/v1/discovery/keys:
    get:
      tags: [Discovery]
      summary: List central-viewer keys
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Central-viewer keys
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CentralViewerKey' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Discovery]
      summary: Save a central-viewer key
      description: 'Required scope: `btpc.admin`.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CentralKeySaveRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CentralViewerKey' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/discovery/keys/{id}:
