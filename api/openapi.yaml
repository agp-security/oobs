        '200':
          description: Updated key
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CentralViewerKey' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
