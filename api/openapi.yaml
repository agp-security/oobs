  /api/v1/protected-users/check:
    get:
      tags: [Protected users]
      summary: Check whether an email is protected
      description: 'Required scope: `btpc.responder`.'
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string }
        - name: subaccountId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Protection check
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProtectedUserCheck' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/protected-users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Protected users]
      summary: Get one protected user
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Protected user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProtectedUserDto' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Protected users]
      summary: Remove a protected user
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      responses:
        '204': { description: Removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------------------- SoD
  /api/v1/sod/conflict-sets:
    get:
      tags: [SoD]
      summary: List conflict sets
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Conflict sets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ConflictSet' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [SoD]
      summary: Create a conflict set
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConflictSetPayload' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConflictSet' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/sod/conflict-sets/{id}:
    parameters:
