  /api/v1/sod/conflict-sets/{id}/enabled:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [SoD]
      summary: Enable or disable a conflict set
      description: 'Required scope: `btpc.admin`.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnabledPatch' }
      responses:
        '200':
          description: Updated conflict set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConflictSet' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
