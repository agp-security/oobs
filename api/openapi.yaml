  /api/v1/sod/scan:
    post:
      tags: [SoD]
      summary: Run an SoD scan against one subaccount
      description: 'Required scope: `btpc.sod_viewer`. `subaccountId` is required.'
      parameters:
        - $ref: '#/components/parameters/CallerSource'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScanRequest' }
      responses:
        '200':
          description: Scan result
          content:
