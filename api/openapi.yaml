          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DiscoveredSubaccount' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/discovery/candidates/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Discovery]
      summary: Get one discovery candidate
      description: 'Required scope: `btpc.viewer`.'
      responses:
        '200':
          description: Candidate
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoveredSubaccount' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
