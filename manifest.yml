applications:
  - name: btp-containment-srv
    path: build/libs/btp-containment.jar
    buildpacks:
      - sap_java_buildpack_jakarta
    memory: 768M
    instances: 1
    timeout: 180
    health-check-type: http
    health-check-http-endpoint: /api/v1/health
    env:
      SPRING_PROFILES_ACTIVE: cloud
      BTPC_FLYWAY_REPAIR_ON_START: true
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    services:
      - btp-containment-xsuaa
      - btp-containment-postgres
      - btp-containment-crypto-key

  - name: btp-containment-approuter
    path: approuter
    buildpacks:
      - nodejs_buildpack
    memory: 256M
    instances: 1
    timeout: 60
    health-check-type: http
    health-check-http-endpoint: /api/v1/health
    env:
      destinations: >
        [
          { "name": "srv",
            "url": "https://btp-containment-srv.cfapps.us10-001.hana.ondemand.com",
            "forwardAuthToken": true }
        ]
      TENANT_HOST_PATTERN: '^(.*)-btp-containment-approuter\\..*'
    services:
      - btp-containment-xsuaa
